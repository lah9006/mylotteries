services:
  - type: web
    name: my-lotteries-app
    runtime: python
    plan: free
    region: oregon
    buildCommand: ./build.sh
    startCommand: gunicorn mylotteries.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DATABASE_URL
        fromDatabase:
          name: my-lotteries-db
          property: connectionString

databases:
  - name: my-lotteries-db
    databaseName: mylotteries_db
    user: mylotteries_user
    plan: free